# Requires a transformers version that provides Qwen2_5_VLForConditionalGeneration.
vqa_root: "images/scienceqa"
vg_root: ""

train_file: ["data/finetune/vqa/scienceqa_train.json"]
val_file: ["data/finetune/vqa/scienceqa_val.json"]
test_file: ["data/finetune/vqa/scienceqa_test.json"]
answer_list: ""
ann_root: "annotation"

scienceqa_problems: data/finetune/vqa/problems.json
scienceqa_split_file: data/finetune/vqa/pid_splits.json
scienceqa_split_name: test

print_freq: 32
batch_size_target: 128
batch_size_test: 4
batch_size_train: 4

model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
qwen_dtype: "bf16"
qwen_gen:
  max_new_tokens: 6
  num_beams: 1
  do_sample: false

task: scienceqa
image_res: 336
max_tokens: 64
k_test: 64
inference: "generate"

init_lr: 2e-5
optimizer:
  init_lr: 2e-5
  weight_decay: 0.05
  min_lr: 0
scheduler:
  epochs: 10
  num_warmup_steps: 0
  sched: cosine
shira_epochs: 10

wandb_data:
  name: qwen25_vl_3b_scienceqa_zeroshot
  project: VQA_QwenVL_generate
  tags: [qwen2.5-vl, scienceqa, zero_shot, generate]
